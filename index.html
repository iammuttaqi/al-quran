    <meta charset="UTF-8" />

    <meta name="theme-color" content="#0c0a09" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />

    <!-- Primary Meta Tags -->
    <meta name="title" content="Al Quran - Read, Study, and Learn The Noble Quran Online" />
    <meta name="description" content="A beautiful, modern, and ad-free web application to read, study, and learn The Noble Quran. Features multiple translations, dark mode, sepia mode, and an elegant reading experience." />
    <meta name="keywords" content="Quran, Al Quran, Noble Quran, Read Quran Online, Quran Translations, Islamic App, Quran Web App, Surah, Ayah, Islam, Muslim" />
    <meta name="author" content="Al Quran App" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quran-shareef.vercel.app/" />
    <meta property="og:title" content="Al Quran - Read, Study, and Learn The Noble Quran Online" />

    <meta property="og:site_name" content="Al Quran" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://quran-shareef.vercel.app/" />
    <meta property="twitter:title" content="Al Quran - Read, Study, and Learn The Noble Quran Online" />
    <meta property="twitter:description" content="A beautiful, modern, and ad-free web application to read, study, and learn The Noble Quran. Features multiple translations, dark mode, sepia mode, and an elegant reading experience." />
    <meta property="twitter:image" content="/og-image.jpg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Al Quran",
        "url": "https://quran-shareef.vercel.app/",
        "description": "A modern, elegant web application for reading and studying the Noble Quran with multiple translations and reading modes.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Multiple Quran Translations",
          "Dark Mode and Sepia Mode",
          "Responsive Design",
          "Ad-free Reading Experience"
        ]
      }
    </script>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem("app-theme");
          if (savedTheme === 'dark' || savedTheme === 'sepia') {
            document.documentElement.classList.add(savedTheme);
          } else if (!savedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>
      <header>
        <h1>Al Quran - Read, Study, and Learn The Noble Quran Online</h1>
        <p>Welcome to Al Quran, a modern, elegant, and ad-free web application designed to help you read, study, and learn the Noble Quran online. Our platform offers a seamless reading experience with multiple translations, ensuring that the message of the Quran is accessible to everyone.</p>
      </header>
      <main>
        <section>
          <h2>Features of Al Quran App</h2>
          <ul>
            <li><strong>Multiple Translations:</strong> Access various English translations to deepen your understanding of the Ayahs.</li>
            <li><strong>Reading Modes:</strong> Choose between Light, Dark, and Sepia modes for a comfortable reading experience at any time of day.</li>
            <li><strong>Responsive Design:</strong> Read the Quran on any device, whether it's your desktop, tablet, or smartphone.</li>
            <li><strong>Search Functionality:</strong> Easily find specific Surahs and Ayahs with our fast and intuitive search feature.</li>
          </ul>
        </section>
        <section>
          <h2>Explore the Quran</h2>
          <p>Begin your journey through the 114 Surahs of the Quran. From Al-Fatihah (The Opening) to An-Nas (Mankind), explore the divine revelations with ease. Each Surah is presented with clear Arabic text alongside your chosen translation.</p>
        </section>
      </main>
      <footer>
        <p>Al Quran App - Dedicated to providing a beautiful and accessible way to engage with the Noble Quran.</p>
      </footer>
      <p>Please enable JavaScript to use the full interactive features of this application.</p>
    </noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
